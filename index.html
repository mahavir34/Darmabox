<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DramaBox Premium Web</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <style>
        :root { --bg: #000000; --card: #1c1c1e; --primary: #ff2a5f; --text: #ffffff; --sub: #8e8e93; --border: #1c1c1e; }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        html, body { background-color: var(--bg); color: var(--text); font-family: sans-serif; width: 100%; overflow-x: hidden; position: relative; }
        .container { width: 100%; max-width: 500px; margin: 0 auto; min-height: 100vh; position: relative; background: #000; padding-bottom: 70px; }
        .page { display: none; width: 100%; animation: fadeIn 0.2s ease-in-out; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: #000000; height: 65px; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #121214; z-index: 1000; max-width: 500px; margin: 0 auto; padding-bottom: 4px; }
        .nav-item { display: flex; flex-direction: column; align-items: center; justify-content: center; color: #8e8e93; text-decoration: none; font-size: 11px; font-weight: 500; background: transparent; border: none; gap: 4px; cursor: pointer; flex: 1; height: 100%; outline: none; }
        .nav-item.active { color: #ff2a5f; }
        .nav-item svg { width: 24px; height: 24px; fill: none; stroke: currentColor; stroke-width: 2.2; stroke-linecap: round; stroke-linejoin: round; pointer-events: none; }
        .nav-item.active svg { stroke: #ff2a5f; }
    </style>
</head>
<body>
<div class="container">

    <div id="home" class="page active"></div>
    <div id="foryou" class="page"></div>
    <div id="member" class="page"></div>
    <div id="mylist" class="page"></div>
    <div id="profile" class="page"></div>

    <div class="bottom-nav" id="customBottomNav">
        <div class="nav-item active" data-target="home">
            <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
            <span>Home</span>
        </div>
        <div class="nav-item" data-target="foryou">
            <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="3"></rect><line x1="12" y1="8" x2="12" y2="16"></line><line x1="8" y1="12" x2="16" y2="12"></line></svg>
            <span>For You</span>
        </div>
        <div class="nav-item" data-target="member">
            <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"></circle><polygon points="12 7.5 13.8 11.3 17.8 11.6 14.7 14.2 15.7 18.2 12 16 8.3 18.2 9.3 14.2 6.2 11.6 10.2 11.3"></polygon></svg>
            <span>Member</span>
        </div>
        <div class="nav-item" data-target="mylist">
            <svg viewBox="0 0 24 24"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"></path></svg>
            <span>My List</span>
        </div>
        <div class="nav-item" data-target="profile">
            <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
            <span>Profile</span>
        </div>
    </div>

</div>

<script>
    const firebaseConfig = {
      apiKey: "AIzaSyAj1gkyf8DIdW0zbtflo44R395MSr3ccEQ",
      authDomain: "local-host-f2778.firebaseapp.com",
      databaseURL: "https://local-host-f2778-default-rtdb.firebaseio.com",
      projectId: "local-host-f2778",
      storageBucket: "local-host-f2778.firebasestorage.app",
      messagingSenderId: "1047439436453",
      appId: "1:1047439436453:web:30e8176df0d0f5a7673b4c",
      measurementId: "G-23H4J7C5T5"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let currentUser = null;
    let isAppInitialized = false;

    firebase.auth().onAuthStateChanged((user) => {
        if (user) {
            currentUser = user;
            if(!isAppInitialized) { initApp(); }
        } else {
            window.location.href = "auth.html";
        }
    });

    function initApp() {
        isAppInitialized = true;
        Promise.all([
            fetch('home.html').then(r => r.text()).then(t => document.getElementById('home').innerHTML = t),
            fetch('foryou.html').then(r => r.text()).then(t => document.getElementById('foryou').innerHTML = t),
            fetch('member.html').then(r => r.text()).then(t => document.getElementById('member').innerHTML = t),
            fetch('mylist.html').then(r => r.text()).then(t => document.getElementById('mylist').innerHTML = t),
            fetch('profile.html').then(r => r.text()).then(t => document.getElementById('profile').innerHTML = t)
        ]).then(() => {
            setupNavListeners();
            loadHomeDramas('Popular'); 
        }).catch(err => { isAppInitialized = false; });
    }

    function setupNavListeners() {
        document.querySelectorAll("#customBottomNav .nav-item").forEach(item => {
            item.onclick = function() {
                const targetPage = this.getAttribute("data-target");
                if (targetPage) { switchTab(targetPage); }
            };
        });
    }

    function switchTab(pageId) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        const targetElement = document.getElementById(pageId);
        if (targetElement) { targetElement.classList.add('active'); }
        
        document.querySelectorAll("#customBottomNav .nav-item").forEach(i => {
            if(i.getAttribute("data-target") === pageId) { i.classList.add("active"); } 
            else { i.classList.remove("active"); }
        });

        if(pageId !== 'foryou') { 
            document.querySelectorAll('.reel-player').forEach(v => v.pause());
        } else {
            loadReelsData();
        }
        if(pageId === 'home') { loadHomeDramas('Popular'); }
        if(pageId === 'profile' && typeof loadProfileData === 'function') { loadProfileData(currentUser); }
        if(pageId === 'mylist' && typeof displayHistory === 'function') { displayHistory(); }
    }

    function loadHomeDramas(catName = 'Popular') {
        const container = document.getElementById('homeDramasContainer');
        if(!container) return;
        
        db.collection("stories").where("category", "==", catName).get()
        .then((snapshot) => {
            container.innerHTML = '';
            if(snapshot.empty) {
                container.innerHTML = '<p style="grid-column: span 3; text-align:center; color:#8e8e93; padding:40px;">No series found.</p>';
                return;
            }
            let i = 0;
            const dummy_cats = ["Forbidden Love", "Revenge", "Hidden Identity", "Contract Lover", "Steamy", "Mafia"];
            snapshot.forEach((doc) => {
                const story = doc.data();
                const dCat = story.genre || dummy_cats[i % dummy_cats.length];
                const dTag = (i % 2 === 0) ? "Hot" : "New";
                i++;
                
                // 🌟 अगर इमेज लिंक टूट जाए तो बैकअप के लिए एक सुंदर डिफ़ॉल्ट बैकग्राउंड रेंडर
                let thumbSrc = story.thumbnail_url || 'https://via.placeholder.com/300x400/1a1a1f/ffffff?text=DramaBox';
                
                container.innerHTML += `
                    <a href="view_story.html?id=${doc.id}" class="drama-card" style="text-decoration:none;" onclick="saveToHistory('${story.title.replace(/'/g, "\\'")}', '${thumbSrc}', '${dCat}')">
                        <div class="thumb-box" style="position:relative; width:100%; aspect-ratio:3/4; background:#1a1a1f; border-radius:8px; overflow:hidden;">
                            <span class="hot-tag" style="position:absolute; top:0; left:0; background:linear-gradient(to right, #ff2a5f, #ff7e00); color:white; font-size:10px; font-weight:800; padding:2px 6px; border-bottom-right-radius:8px; text-transform:uppercase; z-index:2;">${dTag}</span>
                            <img class="thumb-img" src="${thumbSrc}" style="width:100%; height:100%; object-fit:cover; display:block;" onerror="this.src='https://via.placeholder.com/300x400/1a1a1f/ffffff?text=DramaBox'">
                            <span class="views-counter" style="position:absolute; bottom:4px; right:6px; font-size:11px; color:#fff; font-weight:bold; background:rgba(0,0,0,0.4); padding:1px 4px; border-radius:4px; z-index:2;">▶ 61.2M</span>
                        </div>
                        <div class="drama-info" style="padding:6px 2px;">
                            <div class="drama-name" style="font-size:13px; font-weight:700; color:#fff; line-height:1.3; overflow:hidden; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; margin-bottom:2px;">${story.title}</div>
                            <div class="drama-cat" style="font-size:11px; color:var(--sub);">${dCat}</div>
                        </div>
                    </a>`;
            });
        }).catch(err => {
            container.innerHTML = '<p style="grid-column: span 3; text-align:center; color:#ff2a5f; padding:40px;">Error loading data.</p>';
        });
    }

    function loadReelsData() {
        const container = document.getElementById('reelsContainer');
        if(!container) return;
        
        db.collection("chapters").limit(5).get()
        .then((snapshot) => {
            container.innerHTML = '';
            if(snapshot.empty) {
                container.innerHTML = '<div style="text-align:center; padding-top:120px; color:#8e8e93; font-size:14px;">📱 No reels found.</div>';
                return;
            }
            snapshot.forEach((doc) => {
                const reel = doc.data();
                let rawVideo = reel.video_url.replace('?dl=0', '?raw=1').replace('&dl=0', '&raw=1');
                container.innerHTML += `
                    <div class="reel-video-box">
                        <video class="reel-player" src="${rawVideo}" loop playsinline></video>
                        <div class="reel-info-layer">
                            <h3>@${reel.story_title || 'DramaBox'}</h3>
                            <p>Ep ${reel.chapter_number} - ${reel.title}</p>
                        </div>
                    </div>`;
            });
            const firstVideo = document.querySelector('.reel-player');
            if(firstVideo) firstVideo.play();
        }).catch(err => { container.innerHTML = '<p style="text-align:center; color:#ff2a5f; padding-top:40px;">Error loading reels.</p>'; });
    }

    function saveToHistory(title, thumb, cat) {
        let history = JSON.parse(localStorage.getItem('user_history')) || [];
        if (!history.some(item => item.title === title)) {
            history.push({ title: title, thumb: thumb, cat: cat });
            localStorage.setItem('user_history', JSON.stringify(history));
        }
    }
</script>
</body>
</html>
