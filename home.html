<!-- home.html -->
<style>
    .home-container { width: 100%; padding: 0 12px; box-sizing: border-box; }
    .search-row { display: flex; align-items: center; justify-content: space-between; gap: 12px; padding: 15px 0 10px 0; }
    .search-box { background: #1c1c1e; border-radius: 20px; padding: 10px 14px; flex: 1; display: flex; align-items: center; gap: 8px; color: #8e8e93; font-size: 14px; }
    .search-box input { background: transparent; border: none; color: #fff; width: 100%; outline: none; font-size: 13px; }
    .header-icons { display: flex; align-items: center; gap: 10px; }
    .crown-icon { color: #ffcc00; font-size: 24px; cursor: pointer; }
    .gift-box { background: linear-gradient(90deg, #ff2a5f, #ff7e00); color: #fff; font-size: 11px; font-weight: bold; padding: 4px 10px; border-radius: 12px; }
    .sub-tabs { display: flex; gap: 22px; padding: 10px 0; overflow-x: auto; -webkit-overflow-scrolling: touch; }
    .sub-tabs::-webkit-scrollbar { display: none; }
    .sub-tab { color: #8e8e93; font-size: 16px; font-weight: bold; cursor: pointer; white-space: nowrap; transition: color 0.2s; }
    .sub-tab.active { color: #fff; border-bottom: 3px solid #ff2a5f; padding-bottom: 4px; }
    .drama-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 12px 0; width: 100%; }
</style>

<div class="home-container">
    <div class="search-row">
        <div class="search-box">🔍 <input type="text" placeholder="Step Back! I'm the Hidden..."></div>
        <div class="header-icons">
            <span class="crown-icon" onclick="switchTab('member')">👑</span>
            <div class="gift-box">+20</div>
        </div>
    </div>
    
    <div class="sub-tabs">
        <span class="sub-tab active" onclick="filterCategory('Popular', this)">Popular</span>
        <span class="sub-tab" onclick="filterCategory('New', this)">New</span>
        <span class="sub-tab" onclick="filterCategory('Rankings', this)">Rankings</span>
        <span class="sub-tab" onclick="filterCategory('Categories', this)">Categories</span>
    </div>

    <div class="drama-grid" id="homeDramasContainer">
        <p style="grid-column: span 3; text-align:center; color:#8e8e93; padding:40px;">Loading dramas...</p>
    </div>
</div>
