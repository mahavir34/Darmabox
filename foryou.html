<div class="reels-container" id="reelsContainer">
    <!-- रील्स शॉर्ट्स लोड होंगे -->
</div>

<script>
    function loadReelsData() {
        const container = document.getElementById('reelsContainer');
        if(!container) return;
        
        db.collection("chapters").where("is_premium", "==", false).limit(5).get()
        .then((snapshot) => {
            container.innerHTML = '';
            if(snapshot.empty) {
                container.innerHTML = '<div style="text-align:center; padding-top:120px; color:var(--sub); font-size:14px;">📱 Vertical swipe clips loaded successfully.</div>';[span_12](start_span)[span_12](end_span)
                return;
            }
            snapshot.forEach((doc) => {
                const reel = doc.data();
                let rawVideo = reel.video_url.replace('?dl=0', '?raw=1').replace('&dl=0', '&raw=1');[span_13](start_span)[span_13](end_span)
                container.innerHTML += `
                    <div class="reel-video-box">[span_14](start_span)[span_14](end_span)
                        <video class="reel-player" src="${rawVideo}" loop playsinline></video>[span_15](start_span)[span_15](end_span)
                        <div class="reel-info-layer">[span_16](start_span)[span_16](end_span)
                            <h3>@${reel.story_title || 'DramaBox'}</h3>[span_17](start_span)[span_17](end_span)
                            <p>Ep ${reel.chapter_number} - ${reel.title}</p>[span_18](start_span)[span_18](end_span)
                        </div>
                    </div>`;
            });
            
            // पहले वीडियो को ऑटो-प्ले करें
            const firstVideo = document.querySelector('.reel-player');
            if(firstVideo) firstVideo.play();
        });
    }
</script>
