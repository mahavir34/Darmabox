<!-- foryou.html -->
<style>
    .reels-container { width: 100%; height: calc(100vh - 65px); overflow-y: scroll; scroll-snap-type: y mandatory; background: #000; }
    .reel-video-box { width: 100%; height: 100%; scroll-snap-align: start; position: relative; background: #000; overflow: hidden; }
    .reel-video-box video { width: 100%; height: 100%; object-fit: cover; }
    .reel-info-layer { position: absolute; bottom: 20px; left: 16px; right: 80px; z-index: 10; pointer-events: none; text-shadow: 0 1px 4px rgba(0,0,0,0.8); }
    .reel-info-layer h3 { font-size: 16px; font-weight: 700; color: #fff; margin-bottom: 6px; }
    .reel-info-layer p { font-size: 13px; color: #e5e5ea; line-height: 1.4; }
</style>

<div class="reels-container" id="reelsContainer">
    <p style="text-align:center; padding-top:120px; color:var(--sub); font-size:14px;">Loading reels...</p>
</div>
