<!-- profile.html -->
<style>
    .profile-container { width: 100%; padding: 0 16px; box-sizing: border-box; background: #000; }
    
    /* 👤 यूज़र कार्ड स्टाइल */
    .profile-user-card { display: flex; align-items: center; gap: 14px; padding: 24px 0 16px 0; }
    .avatar-circle { width: 56px; height: 56px; background: #222226; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 28px; color: #fff; border: 1px solid #2c2c2e; }
    
    /* 👑 प्रीमियम मेंबरशिप बैनर */
    .join-member-banner { background: linear-gradient(90deg, #ff2a5f, #ff7e00); padding: 16px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; width: 100%; box-sizing: border-box; }
    .banner-left h3 { font-size: 16px; font-weight: 800; color: #fff; letter-spacing: 0.3px; }
    .banner-left p { color: rgba(255,255,255,0.85); font-size: 11px; margin-top: 5px; font-weight: 500; }
    .join-btn { background: #fff; color: #000; border: none; border-radius: 18px; padding: 7px 20px; font-weight: bold; font-size: 13px; cursor: pointer; box-shadow: 0 2px 8px rgba(0,0,0,0.2); }
    
    /* 🎛️ ड्रामाबॉक्स स्टाइल लिस्ट मेनू */
    .menu-list { display: flex; flex-direction: column; width: 100%; background: #121214; border-radius: 14px; padding: 4px 16px; border: 1px solid #1c1c1e; margin-bottom: 20px; }
    .menu-item { display: flex; justify-content: space-between; align-items: center; padding: 16px 0; border-bottom: 1px solid #1c1c1e; color: #fff; font-size: 15px; font-weight: 600; cursor: pointer; text-decoration: none; }
    .menu-item:last-child { border-bottom: none; }
    
    .menu-left { display: flex; align-items: center; gap: 14px; color: #e5e5ea; }
    .menu-left .icon { font-size: 20px; width: 24px; text-align: center; }
    
    .menu-right { display: flex; align-items: center; gap: 8px; color: #8e8e93; font-size: 14px; }
    .arrow-right { color: #3a3a3c; font-size: 14px; margin-left: 2px; }
    
    /* सिक्का और रिवॉर्ड बैज */
    .coin-txt { color: #ffcc00; font-weight: bold; font-size: 15px; display: flex; align-items: center; gap: 4px; }
    .reward-badge { background: #ff2a5f; color: #fff; font-size: 11px; padding: 2px 8px; border-radius: 10px; font-weight: bold; }
</style>

<div class="profile-container">
    
    <!-- यूज़र प्रोफ़ाइल हेडर -->
    <div class="profile-user-card">
        <div class="avatar-circle">👤</div>
        <div>
            <h2 style="font-size:19px; font-weight:800; color:#fff; display: flex; align-items: center; gap: 4px;" id="profEmail">Log in ></h2>
            <p style="color:#8e8e93; font-size:12px; margin-top:4px; letter-spacing: 0.2px;" id="profId">ID: Loading... | Following 0</p>
        </div>
    </div>

    <!-- मेंबरशिप बैनर -->
    <div class="join-member-banner">
        <div class="banner-left">
            <h3>Join Membership</h3>
            <p>Enjoy these exclusive benefits: 16K+ series | 1080p quality</p>
        </div>
        <button class="join-btn" onclick="switchTab('member')">Join</button>
    </div>

    <!-- 🍿 मुख्य फीचर्स सूची (Wallet & Rewards) -->
    <div class="menu-list">
        <div class="menu-item" onclick="switchTab('member')">
            <div class="menu-left"><span class="icon">📈</span>Top Up</div>
            <div class="menu-right"><span class="arrow-right">❯</span></div>
        </div>
        <div class="menu-item" onclick="switchTab('member')">
            <div class="menu-left"><span class="icon">🪙</span>My Wallet</div>
            <div class="menu-right"><span class="coin-txt" id="profCoins">🪙 0</span><span class="arrow-right">❯</span></div>
        </div>
        <div class="menu-item">
            <div class="menu-left"><span class="icon">🎁</span>Earn Rewards</div>
            <div class="menu-right"><span class="reward-badge">+20</span><span class="arrow-right">❯</span></div>
        </div>
        <div class="menu-item">
            <div class="menu-left"><span class="icon">💝</span>Gifts</div>
            <div class="menu-right"><span class="arrow-right">❯</span></div>
        </div>
    </div>

    <!-- 📑 यूज़र हिस्ट्री और सेटिंग्स सूची -->
    <div class="menu-list">
        <div class="menu-item" onclick="switchTab('mylist')">
            <div class="menu-left"><span class="icon">⏰</span>History</div>
            <div class="menu-right"><span class="arrow-right">❯</span></div>
        </div>
        <div class="menu-item" onclick="switchTab('mylist')">
            <div class="menu-left"><span class="icon">📥</span>Download</div>
            <div class="menu-right"><span class="arrow-right">❯</span></div>
        </div>
    </div>

    <!-- 🌐 भाषा और सपोर्ट सूची -->
    <div class="menu-list">
        <div class="menu-item">
            <div class="menu-left"><span class="icon">🌐</span>Language</div>
            <div class="menu-right" style="color: #8e8e93;">English<span class="arrow-right">❯</span></div>
        </div>
        <div class="menu-item">
            <div class="menu-left"><span class="icon">💬</span>Help & feedback</div>
            <div class="menu-right"><span class="arrow-right">❯</span></div>
        </div>
        <div class="menu-item" onclick="handleLogout()">
            <div class="menu-left" style="color:#ff2a5f;"><span class="icon">🚪</span>Log Out Account</div>
            <div class="menu-right"><span class="arrow-right">❯</span></div>
        </div>
    </div>
    
</div>

<script>
    // यूज़र का लाइव डेटा फ़ेच करने का लॉजिक
    function loadProfileData(user) {
        if(!user) return;
        
        // ईमेल आईडी से नाम निकाल कर दिखाना
        if(user.email) {
            document.getElementById('profEmail').innerText = user.email.split('@')[0] + " >";
        }
        
        // यूज़र आईडी सेट करना
        document.getElementById('profId').innerText = "ID: " + user.uid.substring(0, 9).toUpperCase() + " | Following 0";
        
        // फ़ायरबेस क्लाउड डेटाबेस से लाइव सिक्के (Coins) लोड करना
        db.collection("users").doc(user.uid).get().then(doc => {
            if(doc.exists) {
                const userData = doc.data();
                document.getElementById('profCoins').innerText = "🪙 " + (userData.coins ?? 0);
            }
        }).catch(err => {
            console.log("Profile coins sync error");
        });
    }

    // लॉगआउट हैंडलर
    function handleLogout() {
        if(confirm("क्या आप लॉगआउट करना चाहते हैं?")) {
            firebase.auth().signOut().then(() => { 
                window.location.href = "auth.html"; 
            });
        }
    }
</script>
