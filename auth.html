<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up / Log In</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="firebase-config.js"></script> 
    <style>
        :root { --bg: #000000; --card: #121214; --primary: #ff2a5f; --text: #ffffff; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .auth-card { background: var(--card); border-radius: 16px; padding: 30px 20px; border: 1px solid #222; width: 100%; max-width: 400px; text-align: center; }
        .input-group { margin-bottom: 18px; text-align: left; }
        .input-group input { width: 100%; padding: 15px 16px; background: #000; border: 1px solid #2c2c2e; border-radius: 10px; color: #fff; font-size: 15px; outline: none; }
        .buy-btn { background: var(--primary); color: white; border: none; padding: 15px 24px; border-radius: 25px; font-weight: 700; cursor: pointer; width: 100%; font-size: 15px; }
        .secondary-btn { background: #222226; color: #fff; border: 1px solid #2c2c2e; padding: 15px 24px; border-radius: 25px; font-weight: 700; cursor: pointer; width: 100%; font-size: 15px; margin-top: 12px; }
        .error-msg { color: var(--primary); margin-bottom: 15px; font-size: 14px; display: none; }
    </style>
</head>
<body>
    <div class="auth-card">
        <h2 style="font-size:24px; margin-bottom:20px; text-align:left;">Sign Up / Log In</h2>
        <div class="error-msg" id="authError"></div>
        <form id="authForm">
            <div class="input-group"><input type="email" id="authEmail" placeholder="Email Address" required></div>
            <div class="input-group"><input type="password" id="authPassword" placeholder="Password (Min 6 chars)" required></div>
            <button type="button" onclick="handleSignUp()" class="buy-btn">Create Account</button>
            <button type="button" onclick="handleLogIn()" class="secondary-btn">Log In Existing Account</button>
        </form>
    </div>

<script>
    const auth = firebase.auth();

    function showError(txt) {
        const err = document.getElementById('authError');
        err.innerText = txt; err.style.display = 'block';
    }

    function handleSignUp() {
        const email = document.getElementById('authEmail').value.trim();
        const pass = document.getElementById('authPassword').value.trim();
        if(pass.length < 6) { showError("❌ Password must be at least 6 characters!"); return; }
        
        auth.createUserWithEmailAndPassword(email, pass)
        .then((userCredential) => {
            const user = userCredential.user;
            db.collection("users").doc(user.uid).set({
                email: email,
                coins: 10, // 🪙 10 वेलकम बोनस सिक्के
                created_at: firebase.firestore.FieldValue.serverTimestamp()
            }).then(() => { window.location.href = "index.html"; });
        })
        .catch(err => showError("❌ " + err.message));
    }

    function handleLogIn() {
        const email = document.getElementById('authEmail').value.trim();
        const pass = document.getElementById('authPassword').value.trim();
        
        auth.signInWithEmailAndPassword(email, pass)
        .then(() => { window.location.href = "index.html"; })
        .catch(err => showError("❌ Invalid Email or Password!"));
    }
</script>
</body>
</html>
