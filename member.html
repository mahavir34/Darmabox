<style>
    .member-container-box { width: 100%; padding: 0 16px; overflow-x: hidden; box-sizing: border-box; }
    .member-nav-header { display: flex; align-items: center; gap: 15px; padding: 15px 0; background: #000; border-bottom: 1px solid #1c1c1e; }
    .back-arrow-btn { background: none; border: none; color: #fff; font-size: 20px; cursor: pointer; display: flex; align-items: center; }
    .back-arrow-btn svg { width: 24px; height: 24px; fill: none; stroke: currentColor; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }
    .wallet-card-grid { background: #121214; padding: 16px; border-radius: 12px; margin: 15px 0; display: flex; flex-direction: column; gap: 12px; border: 1px solid #1c1c1e; width: 100%; box-sizing: border-box; }
    .plan-info-row { display: flex; justify-content: space-between; align-items: center; width: 100%; }
    .paypal-btn-holder { width: 100%; margin-top: 5px; min-height: 45px; }
</style>

<!-- ⚡ आपकी पेपाल आईडी को लोड करने के लिए एसडीके (SDK) स्क्रिप्ट -->
<script src="https://www.paypal.com/sdk/js?client-id=AaNuXZV5NUQJFPNnmSzCgqPh7uh-s8OG_-7pGz7Gw5TAiJQXA0FNFMJezYFLSwIZK8LW16lJvc4nvDwh&currency=USD"></script>

<div class="member-container-box">
    <div class="member-nav-header">
        <button class="back-arrow-btn" onclick="switchTab('home')">
            <svg viewBox="0 0 24 24"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
        </button>
        <h2 style="font-size:20px; font-weight:800;">Join Membership</h2>
    </div>

    <!-- साप्ताहिक प्लान कंटेनर -->
    <div class="wallet-card-grid">
        <div class="plan-info-row">
            <div>
                <h3 style="font-size:15px; color:#fff;">Weekly Premium Pass</h3>
                <p style="color:var(--sub); font-size:12px; margin-top:4px;">Unlocks everything for 7 Days</p>
            </div>
            <span style="font-weight:800; color:var(--primary); font-size:16px; white-space: nowrap;">$0.99 /wk</span>
        </div>
        <!-- पेपाल रेंडर बटन -->
        <div id="paypal-weekly-container" class="paypal-btn-holder"></div>
    </div>
    
    <!-- मासिक प्लान कंटेनर -->
    <div class="wallet-card-grid">
        <div class="plan-info-row">
            <div>
                <h3 style="font-size:15px; color:#fff;">Monthly Super Value</h3>
                <p style="color:var(--sub); font-size:12px; margin-top:4px;">30 Days unlimited binge watching</p>
            </div>
            <span style="font-weight:800; font-size:16px; color:#fff; white-space: nowrap;">$2.99 /mo</span>
        </div>
        <!-- पेपाल रेंडर बटन -->
        <div id="paypal-monthly-container" class="paypal-btn-holder"></div>
    </div>
</div>

<script>
    function initPayPalButtons() {
        if (typeof paypal === 'undefined') {
            setTimeout(initPayPalButtons, 500);
            return;
        }

        // 1. साप्ताहिक पेमेंट बटन ($0.99)
        document.getElementById('paypal-weekly-container').innerHTML = '';
        paypal.Buttons({
            style: { layout: 'horizontal', color: 'blue', shape: 'pill', label: 'pay', height: 40 },
            createOrder: function(data, actions) {
                return actions.order.create({
                    purchase_units: [{ amount: { value: '0.99' }, description: 'Weekly Premium Pass' }]
                });
            },
            onApprove: function(data, actions) {
                return actions.order.capture().then(function(details) {
                    updateUserPremiumStatus(7);
                });
            }
        }).render('#paypal-weekly-container');

        // 2. मासिक पेमेंट बटन ($2.99)
        document.getElementById('paypal-monthly-container').innerHTML = '';
        paypal.Buttons({
            style: { layout: 'horizontal', color: 'gold', shape: 'pill', label: 'pay', height: 40 },
            createOrder: function(data, actions) {
                return actions.order.create({
                    purchase_units: [{ amount: { value: '2.99' }, description: 'Monthly Super Value Pass' }]
                });
            },
            onApprove: function(data, actions) {
                return actions.order.capture().then(function(details) {
                    updateUserPremiumStatus(30);
                });
            }
        }).render('#paypal-monthly-container');
    }

    // पेमेंट सक्सेसफुल होने पर यूजर का डेटाबेस ऑटो-अपडेट करने का फंक्शन
    function updateUserPremiumStatus(days) {
        if(!firebase.auth().currentUser) return;
        const uid = firebase.auth().currentUser.uid;
        
        const expireDate = new Date();
        expireDate.setDate(expireDate.getDate() + days);

        firebase.firestore().collection("users").doc(uid).update({
            is_premium: true,
            premium_until: firebase.firestore.Timestamp.fromDate(expireDate)
        }).then(() => {
            alert("🎉 Membership Activated Successfully! Enjoy your dramas.");
            if(typeof switchTab === 'function') { switchTab('home'); }
        }).catch(err => alert("Database error but payment received: " + err.message));
    }

    // बटन शुरू करें
    initPayPalButtons();
</script>
